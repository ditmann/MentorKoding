<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentorKoding</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f5f3ee;
            --surface: #ffffff;
            --border: #e0ddd5;
            --text: #1a1916;
            --muted: #7a7870;
            --accent: #2d5a27;
            --accent-light: #eaf2e8;
            --accent-text: #1e3d1a;
            --danger: #8b2020;
            --danger-light: #f9eaea;
            --done-bg: #f0f7ef;
            --tag-bg: #ede9e0;
            --tag-text: #4a4840;
            --gold: #b08d3a;
            --gold-light: #fdf6e3;
            --font-display: 'Fraunces', Georgia, serif;
            --font-mono: 'DM Mono', monospace;
        }

        body {
            font-family: var(--font-mono);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 14px;
        }

        header {
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            padding: 1.25rem 2rem;
            display: flex;
            align-items: baseline;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--accent);
        }

        header span {
            color: var(--muted);
            font-size: 12px;
        }

        .layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: calc(100vh - 61px);
        }

        /* Sidebar */
        .sidebar {
            border-right: 1px solid var(--border);
            background: var(--surface);
            padding: 1.5rem 0;
            overflow-y: auto;
            position: sticky;
            top: 61px;
            height: calc(100vh - 61px);
        }

        .sidebar-section {
            padding: 0 1rem 1rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }

        .sidebar-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            padding: 0 0.5rem;
            margin-bottom: 0.5rem;
        }

        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.55rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
            gap: 0.5rem;
        }

        .user-item:hover { background: var(--bg); }
        .user-item.active { background: var(--accent-light); }

        .user-item-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            min-width: 0;
        }

        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--tag-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 500;
            color: var(--tag-text);
            flex-shrink: 0;
        }

        .user-item.active .avatar {
            background: var(--accent);
            color: white;
        }

        .user-name {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .points-badge {
            font-size: 11px;
            color: var(--gold);
            background: var(--gold-light);
            padding: 2px 7px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .add-user-btn {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background: none;
            border: 1px dashed var(--border);
            border-radius: 6px;
            cursor: pointer;
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 12px;
            text-align: left;
            margin-top: 0.5rem;
            transition: all 0.15s;
        }
        .add-user-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

        /* Main */
        .main {
            padding: 2rem;
            max-width: 820px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            color: var(--muted);
            gap: 0.75rem;
        }

        .empty-state .big { font-family: var(--font-display); font-size: 3rem; opacity: 0.2; }

        .user-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 1.75rem;
            gap: 1rem;
        }

        .user-header-left h2 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .user-header-left .meta {
            color: var(--muted);
            font-size: 12px;
            margin-top: 0.3rem;
        }

        .user-header-right {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .btn {
            padding: 0.45rem 1rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text);
            transition: all 0.15s;
        }
        .btn:hover { background: var(--bg); border-color: var(--muted); }
        .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
        .btn.primary:hover { background: var(--accent-text); }
        .btn.danger { color: var(--danger); border-color: var(--danger); }
        .btn.danger:hover { background: var(--danger-light); }

        /* Stats row */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.25rem;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text);
        }

        .stat-value.gold { color: var(--gold); }

        /* Tasks */
        .tasks-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .tasks-header h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        .task-list { display: flex; flex-direction: column; gap: 0.5rem; }

        .task-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.85rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.85rem;
            transition: opacity 0.2s;
        }

        .task-card.done { background: var(--done-bg); opacity: 0.75; }

        .task-checkbox {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            background: white;
        }

        .task-card.done .task-checkbox {
            background: var(--accent);
            border-color: var(--accent);
        }

        .task-checkbox::after {
            content: '';
            display: none;
            width: 5px;
            height: 9px;
            border: 1.5px solid white;
            border-top: none;
            border-left: none;
            transform: rotate(45deg) translate(-1px, -1px);
        }
        .task-card.done .task-checkbox::after { display: block; }

        .task-body { flex: 1; min-width: 0; }

        .task-title {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .task-card.done .task-title { text-decoration: line-through; color: var(--muted); }

        .task-desc {
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .task-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            flex-shrink: 0;
        }

        .task-points {
            font-size: 12px;
            font-weight: 500;
            color: var(--gold);
        }

        .task-due {
            font-size: 10px;
            color: var(--muted);
        }

        .task-delete {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--border);
            font-size: 16px;
            line-height: 1;
            padding: 2px 4px;
            border-radius: 4px;
            transition: all 0.15s;
        }
        .task-delete:hover { color: var(--danger); background: var(--danger-light); }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border-radius: 12px;
            padding: 1.75rem;
            width: 420px;
            max-width: 95vw;
            border: 1px solid var(--border);
        }

        .modal h3 {
            font-family: var(--font-display);
            font-size: 1.2rem;
            margin-bottom: 1.25rem;
            font-weight: 600;
        }

        .field { margin-bottom: 1rem; }
        .field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.35rem; }

        .field input, .field textarea {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: var(--font-mono);
            font-size: 13px;
            background: var(--bg);
            color: var(--text);
            outline: none;
            transition: border 0.15s;
        }
        .field input:focus, .field textarea:focus { border-color: var(--accent); background: white; }

        .modal-actions { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1.25rem; }

        .loading { color: var(--muted); font-size: 12px; text-align: center; padding: 2rem; }
        .error-msg { color: var(--danger); font-size: 12px; padding: 0.5rem; background: var(--danger-light); border-radius: 6px; margin-bottom: 1rem; }

        /* login page */
        #login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }

        .login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 340px;
        }

        .login-box h1 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 0.25rem;
        }

        .login-box p {
            color: var(--muted);
            font-size: 12px;
            margin-bottom: 1.75rem;
        }

        #app { display: none; }
    </style>
</head>
<body>



<!-- login screen -->
<div id="login-screen">
    <div class="login-box">
        <h1>MentorKoding</h1>
        <div style="display:flex; gap:0; margin-bottom:1.5rem; border-bottom:1px solid var(--border);">
            <button id="tab-login" onclick="switchTab('login')" style="flex:1; background:none; border:none; border-bottom:2px solid var(--accent); padding:0.6rem; font-family:var(--font-mono); font-size:12px; cursor:pointer; color:var(--accent); font-weight:500;">logg inn</button>
            <button id="tab-register" onclick="switchTab('register')" style="flex:1; background:none; border:none; border-bottom:2px solid transparent; padding:0.6rem; font-family:var(--font-mono); font-size:12px; cursor:pointer; color:var(--muted);">ny bruker</button>
        </div>
        <div id="login-error" class="error-msg" style="display:none"></div>
        <div id="form-login">
            <div class="field"><label>Brukernavn</label><input id="l-username" placeholder="brukernavn" autocomplete="username"></div>
            <div class="field" style="margin-bottom:1.25rem"><label>Passord</label><input id="l-password" type="password" placeholder="passord"></div>
            <button class="btn primary" style="width:100%" onclick="login()">Logg inn</button>
        </div>
        <div id="form-register" style="display:none">
            <div class="field"><label>Navn</label><input id="r-name" placeholder="fullt navn"></div>
            <div class="field"><label>Brukernavn</label><input id="r-username" placeholder="brukernavn"></div>
            <div class="field" style="margin-bottom:1.25rem"><label>Passord</label><input id="r-password" type="password" placeholder="passord"></div>
            <button class="btn primary" style="width:100%" onclick="register()">Opprett konto</button>
        </div>
    </div>
</div>

<!-- main app (hidden until logged in) -->
<div id="app">
    <header>
        <h1>MentorKoding</h1>
        <span>oppgavebehandler</span>
        <span id="logged-in-as" style="margin-left:auto; font-size:12px; color:var(--muted)"></span>
        <button class="btn" style="font-size:12px; padding:0.3rem 0.75rem" onclick="logout()">logg ut</button>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-label">Brukere</div>
                <div id="user-list"><div class="loading">Laster...</div></div>
                <button class="add-user-btn" onclick="openModal('user')">+ Legg til bruker</button>
            </div>
        </aside>

        <main class="main" id="main-content">
            <div class="empty-state">
                <div class="big">✦</div>
                <div>Velg en bruker for å se oppgavene</div>
            </div>
        </main>
    </div>

    <!-- Add Task Modal -->
    <div class="modal-overlay" id="task-modal">
        <div class="modal">
            <h3>Ny oppgave</h3>
            <div id="task-form-error" class="error-msg" style="display:none"></div>
            <div class="field"><label>Tittel</label><input id="t-title" placeholder="Oppgavenavn"></div>
            <div class="field"><label>Beskrivelse</label><input id="t-desc" placeholder="Kort beskrivelse"></div>
            <div class="field"><label>Poeng</label><input id="t-points" type="number" min="1" value="10"></div>
            <div class="field"><label>Frist (valgfritt)</label><input id="t-due" type="datetime-local"></div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('task')">Avbryt</button>
                <button class="btn primary" onclick="submitTask()">Lagre</button>
            </div>
        </div>
    </div>

    <!-- Add User Modal -->
    <div class="modal-overlay" id="user-modal">
        <div class="modal">
            <h3>Ny bruker</h3>
            <div id="user-form-error" class="error-msg" style="display:none"></div>
            <div class="field"><label>Navn</label><input id="u-name" placeholder="Fullt navn"></div>
            <div class="field"><label>Brukernavn</label><input id="u-username" placeholder="brukernavn"></div>
            <div class="field"><label>Passord</label><input id="u-password" type="password" placeholder="Passord"></div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('user')">Avbryt</button>
                <button class="btn primary" onclick="submitUser()">Opprett</button>
            </div>
        </div>
    </div>

</div> <!-- end #app -->

<script>
    const API = 'http://localhost:3001/api';
    let users = [];
    let currentUser = null;
    let loggedInUser = null;

    // --- login / logout ---

    function switchTab(tab) {
        const isLogin = tab === 'login';
        document.getElementById('form-login').style.display    = isLogin ? 'block' : 'none';
        document.getElementById('form-register').style.display = isLogin ? 'none'  : 'block';
        document.getElementById('tab-login').style.borderBottomColor    = isLogin ? 'var(--accent)' : 'transparent';
        document.getElementById('tab-register').style.borderBottomColor = isLogin ? 'transparent'   : 'var(--accent)';
        document.getElementById('tab-login').style.color    = isLogin ? 'var(--accent)' : 'var(--muted)';
        document.getElementById('tab-register').style.color = isLogin ? 'var(--muted)'  : 'var(--accent)';
        document.getElementById('login-error').style.display = 'none';
    }

    async function register() {
        const name     = document.getElementById('r-name').value.trim();
        const username = document.getElementById('r-username').value.trim();
        const password = document.getElementById('r-password').value;
        const errEl    = document.getElementById('login-error');

        if (!name || !username || !password) {
            errEl.textContent = 'fyll inn alle feltene';
            errEl.style.display = 'block';
            return;
        }

        try {
            const res  = await fetch(`${API}/users`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, username, password })
            });
            const data = await res.json();

            if (data.success) {
                // log straight in after registering
                document.getElementById('l-username').value = username;
                document.getElementById('l-password').value = password;
                switchTab('login');
                login();
            } else {
                errEl.textContent = 'kunne ikke opprette bruker';
                errEl.style.display = 'block';
            }
        } catch (e) {
            errEl.textContent = 'kunne ikke koble til serveren';
            errEl.style.display = 'block';
        }
    }

    async function login() {
        const username = document.getElementById('l-username').value.trim();
        const password = document.getElementById('l-password').value;
        const errEl    = document.getElementById('login-error');

        if (!username || !password) {
            errEl.textContent = 'fyll inn brukernavn og passord';
            errEl.style.display = 'block';
            return;
        }

        try {
            const res  = await fetch(`${API}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.success) {
                loggedInUser = { username: username, name: data.name };
                errEl.style.display = 'none';
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('logged-in-as').textContent = data.name;

                // hide the sidebar, user only sees their own stuff
                document.querySelector('.sidebar').style.display = 'none';
                document.querySelector('.layout').style.gridTemplateColumns = '1fr';

                // load tasks directly, no selectUser needed
                currentUser = { username: data.username, name: data.name, total_points: 0 };
                const taskRes = await fetch(`${API}/tasks/${data.username}`);
                const tasks = await taskRes.json();
                renderUserView(tasks);
            } else {
                errEl.textContent = 'feil brukernavn eller passord';
                errEl.style.display = 'block';
            }
        } catch (e) {
            errEl.textContent = 'kunne ikke koble til serveren';
            errEl.style.display = 'block';
        }
    }

    function logout() {
        loggedInUser = null;
        currentUser  = null;
        document.getElementById('app').style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('l-username').value = '';
        document.getElementById('l-password').value = '';
        document.getElementById('main-content').innerHTML = '<div class="empty-state"><div class="big">✦</div><div>Velg en bruker for å se oppgavene</div></div>';
        document.querySelector('.sidebar').style.display = '';
        document.querySelector('.layout').style.gridTemplateColumns = '';
    }

    // submit login on enter key
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') login();
    });

    async function fetchUsers() {
        if (!loggedInUser) return;
        try {
            const res  = await fetch(`${API}/users/${loggedInUser.username}`);
            const user = await res.json();
            users = [user];
            currentUser = user;
            renderUserList();
        } catch(e) {
            document.getElementById('user-list').innerHTML = '<div class="loading" style="color:#8b2020">Kunne ikke koble til server</div>';
        }
    }

    function initials(name) {
        return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    }

    function formatDate(str) {
        if (!str) return '—';
        return new Date(str).toLocaleDateString('no-NO', { day:'numeric', month:'short' });
    }

    function renderUserList() {
        const list = document.getElementById('user-list');
        if (!users.length) { list.innerHTML = '<div class="loading">Ingen brukere</div>'; return; }
        list.innerHTML = users.map(u => `
    <div class="user-item ${currentUser?.username === u.username ? 'active' : ''}" onclick="selectUser('${u.username}')">
      <div class="user-item-left">
        <div class="avatar">${initials(u.name)}</div>
        <span class="user-name">${u.name}</span>
      </div>
      <span class="points-badge">${u['total_points']}p</span>
    </div>
  `).join('');
    }

    async function selectUser(username) {
        currentUser = users.find(u => u.username === username) || currentUser || loggedInUser;
        renderUserList();
        const main = document.getElementById('main-content');
        main.innerHTML = '<div class="loading">Laster oppgaver...</div>';
        const res = await fetch(`${API}/tasks/${username}`);
        const tasks = await res.json();
        renderUserView(tasks);
    }

    function renderUserView(tasks) {
        const done = tasks.filter(t => t.done);
        const pending = tasks.filter(t => !t.done);
        const earnedPoints = done.reduce((s, t) => s + t.points, 0);

        document.getElementById('main-content').innerHTML = `
    <div class="user-header">
      <div class="user-header-left">
        <h2>${currentUser.name}</h2>
        <div class="meta">@${currentUser.username}</div>
      </div>
      <div class="user-header-right">
        <button class="btn primary" onclick="openModal('task')">+ Ny oppgave</button>
        <button class="btn danger" onclick="deleteUser('${currentUser.username}')">Slett bruker</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Totale poeng</div>
        <div class="stat-value gold">${currentUser['total_points']}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Fullførte</div>
        <div class="stat-value">${done.length} / ${tasks.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Gjenstående</div>
        <div class="stat-value">${pending.length}</div>
      </div>
    </div>

    <div class="tasks-header">
      <h3>Aktive oppgaver</h3>
    </div>
    <div class="task-list" id="pending-tasks">
      ${pending.length ? pending.map(t => taskCard(t)).join('') : '<div class="loading">Ingen aktive oppgaver</div>'}
    </div>

    ${done.length ? `
    <div class="tasks-header" style="margin-top:1.75rem">
      <h3>Fullførte oppgaver</h3>
    </div>
    <div class="task-list">${done.map(t => taskCard(t)).join('')}</div>
    ` : ''}
  `;
    }

    function taskCard(t) {
        const name = encodeURIComponent(t.tasks);
        return `
    <div class="task-card ${t.done ? 'done' : ''}" id="task-${name}">
      <div class="task-checkbox" onclick="toggleTask('${t.tasks}')"></div>
      <div class="task-body">
        <div class="task-title">${t.tasks}</div>
        <div class="task-desc">${t['task_description'] || ''}</div>
      </div>
      <div class="task-meta">
        <span class="task-points">${t.points}p</span>
        <span class="task-due">${formatDate(t['date_due'])}</span>
      </div>
      <button class="task-delete" onclick="deleteTask('${t.tasks}')" title="Slett">×</button>
    </div>
  `;
    }

    async function toggleTask(taskName) {
        await fetch(`${API}/tasks/${encodeURIComponent(taskName)}/${currentUser.username}`, { method: 'PATCH' });
        await refreshUser();
    }

    async function deleteTask(taskName) {
        if (!confirm(`Slett oppgaven "${taskName}"?`)) return;
        await fetch(`${API}/tasks/${encodeURIComponent(taskName)}/${currentUser.username}`, { method: 'DELETE' });
        await refreshUser();
    }

    async function deleteUser(username) {
        if (!confirm(`Slett brukeren "${currentUser.name}" og alle oppgavene?`)) return;
        await fetch(`${API}/users/${username}`, { method: 'DELETE' });
        currentUser = null;
        document.getElementById('main-content').innerHTML = '<div class="empty-state"><div class="big">✦</div><div>Velg en bruker for å se oppgavene</div></div>';
        await fetchUsers();
    }

    async function refreshUser() {
        const r = await fetch(`${API}/users/${currentUser.username}`);
        currentUser = await r.json();
        users = [currentUser];
        const res = await fetch(`${API}/tasks/${currentUser.username}`);
        const tasks = await res.json();
        renderUserView(tasks);
    }

    function openModal(type) {
        document.getElementById(`${type}-modal`).classList.add('open');
    }

    function closeModal(type) {
        document.getElementById(`${type}-modal`).classList.remove('open');
    }

    async function submitTask() {
        const title = document.getElementById('t-title').value.trim();
        const desc = document.getElementById('t-desc').value.trim();
        const points = parseInt(document.getElementById('t-points').value);
        const due = document.getElementById('t-due').value;
        const errEl = document.getElementById('task-form-error');

        if (!title) { errEl.textContent = 'Tittel er påkrevd.'; errEl.style.display='block'; return; }
        errEl.style.display='none';

        await fetch(`${API}/tasks/${currentUser.username}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tasks: title, description: desc, points: points || 10, dateDue: due || null })
        });

        document.getElementById('t-title').value = '';
        document.getElementById('t-desc').value = '';
        document.getElementById('t-points').value = '10';
        document.getElementById('t-due').value = '';
        closeModal('task');
        await refreshUser();
    }

    async function submitUser() {
        const name = document.getElementById('u-name').value.trim();
        const username = document.getElementById('u-username').value.trim();
        const password = document.getElementById('u-password').value;
        const errEl = document.getElementById('user-form-error');

        if (!name || !username || !password) { errEl.textContent = 'Alle feltene er påkrevd.'; errEl.style.display='block'; return; }
        errEl.style.display='none';

        await fetch(`${API}/users`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, username, password })
        });

        document.getElementById('u-name').value = '';
        document.getElementById('u-username').value = '';
        document.getElementById('u-password').value = '';
        closeModal('user');
        await fetchUsers();
    }

    // Close modal on overlay click
    document.querySelectorAll('.modal-overlay').forEach(el => {
        el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
    });

</script>
</body>
</html>
